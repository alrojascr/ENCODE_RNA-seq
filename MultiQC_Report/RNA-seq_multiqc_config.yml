title: "Gene Expression Profiling of Dental Fibroblasts (DF) and Dental Pulp (DP)"

report_header_info:
  - Name: "Alexis Felipe Rojas"
  - Contact E-mail: "alexis_rojasc@javeriana.edu.co"
  - Application Type: "Paired-end RNA-seq"

show_analysis_paths: false
show_analysis_time: false
export_plots: false

# Run only selected modules
run_modules:
  - custom_content
  - fastqc
  - fastp
  - sortmerna
  - star
  - rsem
  - samtools
  - picard
  - rseqc
  - qualimap
  - preseq

# Module display order and configuration
module_order:

  - fastqc:
      anchor: "fastqc_raw"
      name: "FastQC (Raw)"
      info: >
        Quality control metrics for raw paired-end RNA-seq reads
        prior to adapter trimming and quality filtering.
      path_filters:
        - "/hpcfs/home/cursos/s.abril01/RNA-seq/Odon/Quality_control/FastQC_raw/**"

  - fastp:
      anchor: "fastp"
      name: "FastP"
      info: >
        Summary of fastp processing for paired-end RNA-seq data,
        including adapter detection, quality trimming,
        poly-G/poly-X removal, and read length filtering.
      path_filters:
        - "/hpcfs/home/cursos/s.abril01/RNA-seq/Odon/Quality_control/FastP/**"

  - fastqc:
      anchor: "fastqc_clean"
      name: "FastQC (clean)"
      info: >
        Quality control metrics for paired-end RNA-seq reads
        after fastp trimming and filtering.
      path_filters:
        - "/hpcfs/home/cursos/s.abril01/RNA-seq/Odon/Quality_control/FastQC_clean/**"

  - sortmerna:
      anchor: "sortmerna"
      name: "SortMeRNA rRNA Removal"
      info: >
        Summary metrics from SortMeRNA rRNA depletion, including the proportion
        of reads classified as rRNA versus non-rRNA. This step enriches for
        informative transcriptomic reads prior to genome alignment.
      path_filters:
        - "/hpcfs/home/cursos/s.abril01/RNA-seq/Odon/rRNA_removal/SortMeRNA/Results/**"

  - star:
      anchor: "star_alignment"
      name: "STAR Alignment"
      info: >
        Alignment statistics generated by STAR, including uniquely mapped reads,
        multi-mapped reads, mismatch rates, splice junction detection, and
        overall genome mapping efficiency for paired-end RNA-seq data.
      path_filters:
        - "/hpcfs/home/cursos/s.abril01/RNA-seq/Odon/Mapping/STAR-RSEM/Results/**"

  - rsem:
      anchor: "rsem_quantification"
      name: "RSEM Quantification"
      info: >
        Gene and transcript abundance estimates computed using RSEM, providing
        expected counts, TPM, and FPKM values derived from STAR-aligned reads
        using expectation-maximization modeling.
      path_filters:
        - "/hpcfs/home/cursos/s.abril01/RNA-seq/Odon/Mapping/STAR-RSEM/Results/RSEM_results/**"

  - samtools:
      anchor: "samtools_stats"
      name: "Samtools Statistics"
      info: >
        Alignment-level quality statistics derived from SAM/BAM files, including
        mapping quality distributions, read counts, duplication-related metrics,
        and flag-based alignment summaries.
      path_filters:
        - "/hpcfs/home/cursos/s.abril01/RNA-seq/Odon/Quality_mapping/Samtools/**"

  - picard:
      anchor: "picard_metrics"
      name: "Picard Metrics"
      info: >
        Post-alignment quality metrics generated by Picard tools, including
        duplication rates, insert size distribution, and library complexity
        estimates for RNA-seq libraries.
      path_filters:
        - "/hpcfs/home/cursos/s.abril01/RNA-seq/Odon/Quality_mapping/Picard/**"

  - rseqc:
      anchor: "rseqc_metrics"
      name: "RSeQC RNA-seq QC Metrics"
      info: >
        RNA-seq specific quality control metrics, including read distribution
        across genomic features, inner mate distance, junction annotation,
        strandness inference, duplication patterns, and overall BAM statistics.
      path_filters:
        - "/hpcfs/home/cursos/s.abril01/RNA-seq/Odon/Quality_mapping/RSeQC/**"

  - qualimap:
      anchor: "qualimap_rnaseq"
      name: "Qualimap RNA-seq QC"
      info: >
        RNA-seq alignment quality assessment including coverage uniformity,
        gene body coverage bias, GC bias, and mapping distribution across
        genomic regions.
      path_filters:
        - "/hpcfs/home/cursos/s.abril01/RNA-seq/Odon/Quality_mapping/Qualimap/**"

  - preseq:
      anchor: "preseq_complexity"
      name: "Preseq Library Complexity"
      info: >
        Library complexity estimation and sequencing yield extrapolation.
        Predicts how many additional unique reads would be obtained with
        deeper sequencing, helping assess duplication levels and whether
        further sequencing would be beneficial.
      path_filters:
        - "/hpcfs/home/cursos/s.abril01/RNA-seq/Odon/Quality_mapping/Preseq/**"   

# RSeQC sections to include
rseqc_sections:
  - read_distribution
  - inner_distance
  - read_duplication
  - junction_annotation
  - junction_saturation
  - infer_experiment
  - bam_stat

# Trimming / filename cleaning extensions
extra_fn_clean_exts:
  - "_screen"
  - ".non_rRNA_reads"
  - ".nonrrna"
  - "_readgroup"
  - "_read_distribution"
  - "_infer_experiment"
  - "_bam_stat"
  - "_trimmed_1"
  - "_trimmed_2"
  - "_sorted"

